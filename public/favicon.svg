<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="blur-large" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <filter id="blur-small" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <!-- Glow Layers -->
  <g stroke="#FF1493" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <g filter="url(#blur-large)">
      <path stroke-width="32" d="M 256 80 L 60 210 L 256 340 L 452 210 Z" />
      <path stroke-width="32" d="M 130 256.4 V 350 A 126 80 0 0 0 382 350 V 256.4" />
      <line stroke-width="32" x1="452" y1="210" x2="452" y2="340" />
      <circle stroke-width="32" cx="452" cy="360" r="20" fill="#FF1493" />
      <path stroke-width="32" d="M 436 376 L 436 450 L 452 435 L 468 450 L 468 376" fill="#FF1493" />
    </g>
    <g filter="url(#blur-small)">
      <path stroke-width="20" d="M 256 80 L 60 210 L 256 340 L 452 210 Z" />
      <path stroke-width="20" d="M 130 256.4 V 350 A 126 80 0 0 0 382 350 V 256.4" />
      <line stroke-width="20" x1="452" y1="210" x2="452" y2="340" />
      <circle stroke-width="20" cx="452" cy="360" r="20" fill="#FF1493" />
      <path stroke-width="20" d="M 436 376 L 436 450 L 452 435 L 468 450 L 468 376" fill="#FF1493" />
    </g>
  </g>

  <!-- Solid Thick Pink -->
  <g stroke="#FF1493" stroke-width="20" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M 130 256.4 V 350 A 126 80 0 0 0 382 350 V 256.4" />
    <line x1="452" y1="210" x2="452" y2="340" />
    <circle cx="452" cy="360" r="20" fill="#FF1493" />
    <path d="M 436 376 L 436 450 L 452 435 L 468 450 L 468 376" fill="#FF1493" />
    <path d="M 256 80 L 60 210 L 256 340 L 452 210 Z" />
  </g>

  <!-- Solid Thin White -->
  <g stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M 130 256.4 V 350 A 126 80 0 0 0 382 350 V 256.4" />
    <line x1="452" y1="210" x2="452" y2="340" />
    <circle cx="452" cy="360" r="20" />
    <path d="M 436 376 L 436 450 L 452 435 L 468 450 L 468 376" />
    <path d="M 256 80 L 60 210 L 256 340 L 452 210 Z" />
  </g>
</svg>